site_name: My Super Cool Project
site_url: https://sandeep280993.github.io/masandeep/
site_author: The Awesome Team
site_description: This site contains my portfolio related to API documentation.
repo_url: https://github.com/sandeep280993/masandeep
repo_name: masandeep 
edit_uri: ""
theme:
  name: material
  # Navigation bar style: can be 'primary' (blue), 'dark', or 'light'
  nav_style: primary
  # Default color mode: 'light', 'dark', or 'auto' (tries to match system preference)
  color_mode: light
  # Allow user to toggle color mode via a UI switch: true or false
  user_color_mode_toggle: true
  # Enable/disable code highlighting with highlight.js (default is true)
  highlightjs: true
  # Style for highlight.js in light mode (see highlight.js docs for style names)
  hljs_style: github
  # Style for highlight.js in dark mode
  hljs_style_dark: github-dark
  # Add support for more programming languages in highlight.js if they aren't common
  hljs_languages:
    - yaml
    - rust
    - go
  # Google Analytics (GA4) configuration
  analytics:
    gtag: 'G-YOURTRACKINGID' # Replace with your Google Analytics 4 Measurement ID
  # Maximum navigation depth to display in the sidebar
  navigation_depth: 2
  # Locale for theme translations (e.g., for "Next", "Previous" buttons)
  # locale: 'en' # 'en' is English, 'fr' for French, etc. Requires mkdocs[i18n]
  palette: 

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode


  features:
    - navigation.instant
    - navigation.instant.preview
    - navigation.instant.progress
    - navigation.tracking
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - toc.follow
    - navigation.top
    # - toc.integrate 
    - content.code.copy


  
use_directory_urls: true
extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences  
  
plugins:
  - search
  - tags
nav: 
  - Home : index.md
  - About : about/index.md
  - Portfolio :
    - API reference : 
      - Mock Credit Card APIs : portfolio/mock-api-doc.md
      - Create card : portfolio/create.md
      - Delete card : portfolio/delete.md
      - Update card : portfolio/update.md
      - Retrieve card : portfolio/retrieve.md
      - Retrieve all cards : portfolio/retrieve-all.md
  - AI projects : 
    - AI projects: ai-projects/index.md
    - Ai-projects: ai-projects/ai-project.md
    - Offline markdown previewer: ai-projects/Gemini-style-mdpreview.md
    - Video to doc convertoer: ai-projects/vdo-to-doc-converter.md
